<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam — ExamFlow</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0; --surface: #ffffff; --primary: #1a1a2e;
    --accent: #4f46e5; --accent-light: #ede9fe;
    --text: #1a1a2e; --muted: #6b7280; --border: #e5e7eb;
    --danger: #dc2626; --danger-light: #fee2e2; --radius: 12px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); min-height: 100vh; }
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 10; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--primary); }
  .logo span { color: var(--accent); }
  .timer { font-size: 1.1rem; font-weight: 600; font-family: monospace; color: var(--text); background: #f3f4f6; padding: 0.3rem 0.85rem; border-radius: 8px; min-width: 80px; text-align: center; }
  .timer.warning { color: var(--danger); background: var(--danger-light); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
  .student-name { font-size: 0.85rem; color: var(--muted); }
  main { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
  .exam-header { margin-bottom: 2rem; }
  .exam-header h1 { font-size: 1.4rem; font-weight: 600; }
  .exam-header p { font-size: 0.85rem; color: var(--muted); margin-top: 0.25rem; }
  .progress-bar-wrap { background: var(--border); border-radius: 20px; height: 6px; margin: 1.5rem 0; }
  .progress-bar { background: var(--accent); border-radius: 20px; height: 6px; transition: width 0.3s; }
  .progress-label { font-size: 0.78rem; color: var(--muted); text-align: right; margin-top: 0.3rem; }
  .q-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 1rem; }
  .q-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .q-num { font-size: 0.78rem; font-weight: 600; color: var(--accent); background: var(--accent-light); padding: 3px 10px; border-radius: 20px; }
  .q-marks { font-size: 0.78rem; color: var(--muted); background: #f3f4f6; padding: 3px 10px; border-radius: 20px; }
  .q-text { font-size: 1rem; font-weight: 500; margin-bottom: 1.25rem; line-height: 1.5; }
  .options-list { display: flex; flex-direction: column; gap: 0.6rem; }
  .option-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.7rem 1rem; border: 1.5px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.15s; font-size: 0.92rem; }
  .option-item:hover { border-color: var(--accent); background: var(--accent-light); }
  .option-item.selected { border-color: var(--accent); background: var(--accent-light); font-weight: 500; }
  .option-item input[type="radio"] { accent-color: var(--accent); }
  .short-answer-input { width: 100%; padding: 0.75rem 1rem; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; color: var(--text); outline: none; resize: vertical; min-height: 80px; transition: border-color 0.15s; }
  .short-answer-input:focus { border-color: var(--accent); }
  .submit-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
  .submit-info { font-size: 0.85rem; color: var(--muted); }
  .btn-submit { background: #059669; color: #fff; border: none; border-radius: var(--radius); padding: 0.75rem 2rem; font-size: 0.95rem; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.2s; }
  .btn-submit:hover { background: #047857; }
  .btn-submit:disabled { background: #6ee7b7; cursor: not-allowed; }
  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:100; align-items:center; justify-content:center; }
  .overlay.open { display:flex; }
  .modal { background:var(--surface); border-radius:16px; padding:2rem; max-width:400px; width:90%; }
  .modal h2 { font-size:1.1rem; font-weight:600; margin-bottom:0.75rem; }
  .modal p { font-size:0.88rem; color:var(--muted); margin-bottom:1.5rem; }
  .modal-btns { display:flex; gap:0.75rem; justify-content:flex-end; }
  .btn-ghost { padding:0.6rem 1.1rem; border:1px solid var(--border); border-radius:8px; background:transparent; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:0.85rem; }
  .btn-confirm { padding:0.6rem 1.25rem; border:none; border-radius:8px; background:#059669; color:#fff; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:0.85rem; font-weight:500; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 6px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<nav>
  <div class="logo">Exam<span>Flow</span></div>
  <div style="display:flex;align-items:center;gap:0.75rem">
    <span class="student-name" id="studentNameDisplay"></span>
    <div class="timer" id="timerDisplay">--:--</div>
  </div>
</nav>
<main id="examMain"><div style="text-align:center;padding:4rem;color:var(--muted)">Loading exam...</div></main>
<div class="submit-bar">
  <div class="submit-info" id="submitInfo">0 / 0 answered</div>
  <button class="btn-submit" id="submitBtn" onclick="confirmSubmit()">Submit Exam ✓</button>
</div>
<div class="overlay" id="confirmOverlay">
  <div class="modal">
    <h2>Submit Exam?</h2>
    <p id="confirmMsg">Are you sure you want to submit?</p>
    <div class="modal-btns">
      <button class="btn-ghost" onclick="closeConfirm()">Go Back</button>
      <button class="btn-confirm" id="confirmBtn" onclick="submitExam()">Submit Now</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

 const firebaseConfig = {
  apiKey: "AIzaSyBemfMktY_qO3dThH7NxjIr3EhhJnlxdrA",
  authDomain: "online-exam-and-auto-grading.firebaseapp.com",
  projectId: "online-exam-and-auto-grading",
  storageBucket: "online-exam-and-auto-grading.firebasestorage.app",
  messagingSenderId: "430727378681",
  appId: "1:430727378681:web:496eda782bd99e6b7f9428"
};
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const session = JSON.parse(sessionStorage.getItem('examflow_session') || 'null');
  const exam = JSON.parse(sessionStorage.getItem('examflow_exam') || 'null');
  if (!session || !exam) { window.location.href = 'student-login.html'; }

  document.getElementById('studentNameDisplay').textContent = session.studentName;

  const answers = {};
  let timerInterval;
  let secondsLeft = exam.duration * 60;
  let submitted = false;

  function renderExam() {
    const total = exam.questions.reduce((s, q) => s + (q.marks || 1), 0);
    document.getElementById('examMain').innerHTML = `
      <div class="exam-header">
        <h1>${exam.title}</h1>
        <p>${exam.teacherName ? 'Conducted by ' + exam.teacherName + '  •  ' : ''}${exam.description ? exam.description + '  •  ' : ''}${exam.questions.length} questions  •  ${total} total marks</p>
        <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
        <div class="progress-label" id="progressLabel">0 answered</div>
      </div>
      ${exam.questions.map((q, i) => buildQCard(q, i)).join('')}`;
    updateProgress();
  }

  function buildQCard(q, idx) {
    let answerHtml = '';
    if (q.type === 'mcq') {
      answerHtml = `<div class="options-list">${q.options.map((opt, i) =>
        `<label class="option-item" id="opt_${q.id}_${i}" onclick="selectOption(${q.id},${i})">
          <input type="radio" name="q_${q.id}" value="${i}" style="pointer-events:none"> ${opt}
        </label>`).join('')}</div>`;
    } else if (q.type === 'truefalse') {
      answerHtml = `<div class="options-list">
        <label class="option-item" id="opt_${q.id}_true" onclick="selectTF(${q.id},'true')">
          <input type="radio" name="q_${q.id}" value="true" style="pointer-events:none"> True
        </label>
        <label class="option-item" id="opt_${q.id}_false" onclick="selectTF(${q.id},'false')">
          <input type="radio" name="q_${q.id}" value="false" style="pointer-events:none"> False
        </label></div>`;
    } else {
      answerHtml = `<textarea class="short-answer-input" placeholder="Type your answer here..." id="short_${q.id}" oninput="setShort(${q.id},this.value)"></textarea>`;
    }
    return `<div class="q-card">
      <div class="q-meta">
        <span class="q-num">Q${idx+1}</span>
        <span class="q-marks">${q.marks||1} mark${(q.marks||1)>1?'s':''}</span>
      </div>
      <div class="q-text">${q.text}</div>
      ${answerHtml}
    </div>`;
  }

  window.selectOption = function(qId, optIdx) {
    answers[qId] = optIdx;
    const q = exam.questions.find(q => q.id === qId);
    q.options.forEach((_, i) => {
      const el = document.getElementById(`opt_${qId}_${i}`);
      if (el) el.classList.toggle('selected', i === optIdx);
    });
    updateProgress();
  };

  window.selectTF = function(qId, val) {
    answers[qId] = val;
    ['true','false'].forEach(v => {
      const el = document.getElementById(`opt_${qId}_${v}`);
      if (el) el.classList.toggle('selected', v === val);
    });
    updateProgress();
  };

  window.setShort = function(qId, val) { answers[qId] = val; updateProgress(); };

  function updateProgress() {
    const total = exam.questions.length;
    const answered = Object.keys(answers).filter(id => answers[id] !== undefined && answers[id] !== '').length;
    const pct = total > 0 ? (answered / total) * 100 : 0;
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = `${answered} of ${total} answered`;
    document.getElementById('submitInfo').textContent = `${answered} / ${total} answered`;
  }

  function startTimer() {
    timerInterval = setInterval(() => {
      secondsLeft--;
      const m = Math.floor(secondsLeft / 60), s = secondsLeft % 60;
      const el = document.getElementById('timerDisplay');
      el.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
      if (secondsLeft <= 300) el.classList.add('warning');
      if (secondsLeft <= 0) { clearInterval(timerInterval); gradeAndSave(true); }
    }, 1000);
  }

  window.confirmSubmit = function() {
    const total = exam.questions.length;
    const answered = Object.keys(answers).filter(id => answers[id] !== undefined && answers[id] !== '').length;
    const unanswered = total - answered;
    document.getElementById('confirmMsg').textContent = unanswered > 0
      ? `You have ${unanswered} unanswered question(s). Submit anyway?`
      : 'All questions answered. Ready to submit?';
    document.getElementById('confirmOverlay').classList.add('open');
  };

  window.closeConfirm = function() { document.getElementById('confirmOverlay').classList.remove('open'); };

  window.submitExam = function() {
    clearInterval(timerInterval);
    closeConfirm();
    gradeAndSave(false);
  };

  async function gradeAndSave(autoSubmit) {
    if (submitted) return;
    submitted = true;
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Submitting...';

    let score = 0, total = 0;
    exam.questions.forEach(q => {
      const marks = q.marks || 1;
      total += marks;
      const ans = answers[q.id];
      if (q.type === 'mcq') {
        if (ans !== undefined && parseInt(ans) === q.correctIndex) score += marks;
      } else if (q.type === 'truefalse') {
        if (ans === q.correctAnswer) score += marks;
      } else if (q.type === 'short') {
        if (ans && q.modelAnswer) {
          const s = String(ans).toLowerCase().trim();
          const m = q.modelAnswer.toLowerCase().trim();
          if (s.includes(m) || m.includes(s)) score += marks;
        }
      }
    });

    const percent = total > 0 ? Math.round((score / total) * 100) : 0;
    const result = {
      examId: session.examId,
      studentName: session.studentName,
      score, total, percent,
      answers,
      submittedAt: new Date().toISOString()
    };

    try {
      await addDoc(collection(db, 'results'), result);
    } catch (e) {
      console.warn('Could not save to Firebase, continuing anyway:', e.message);
    }

    sessionStorage.setItem('examflow_last_result', JSON.stringify(result));
    sessionStorage.setItem('examflow_last_exam', JSON.stringify(exam));
    window.onbeforeunload = null;
    window.location.href = 'results-page.html';
  }

  renderExam();
  startTimer();
  window.onbeforeunload = () => 'Are you sure? Your exam progress will be lost.';
</script>
</body>
</html>
