<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Registration — ExamFlow</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0; --surface: #ffffff; --primary: #1a1a2e;
    --accent: #4f46e5; --accent-light: #ede9fe;
    --text: #1a1a2e; --muted: #6b7280; --border: #e5e7eb;
    --danger: #dc2626; --danger-light: #fee2e2;
    --success: #059669; --success-light: #d1fae5; --radius: 12px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 2rem; color: var(--primary); margin-bottom: 0.25rem; }
  .logo span { color: var(--accent); }
  .tagline { font-size: 0.9rem; color: var(--muted); margin-bottom: 2.5rem; text-align: center; }
  .card { background: var(--surface); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 420px; border: 1px solid var(--border); box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
  .card h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.4rem; }
  .card .sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 2rem; }
  .form-group { margin-bottom: 1.1rem; }
  .form-group label { display: block; font-size: 0.82rem; font-weight: 500; margin-bottom: 0.4rem; }
  .form-group input { width: 100%; padding: 0.7rem 0.9rem; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; color: var(--text); outline: none; transition: border-color 0.15s; }
  .form-group input:focus { border-color: var(--accent); }
  .form-group .hint { font-size: 0.75rem; color: var(--muted); margin-top: 0.3rem; }
  .btn-primary { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); padding: 0.8rem; font-size: 0.95rem; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.2s; margin-top: 0.5rem; }
  .btn-primary:hover { background: #4338ca; }
  .btn-primary:disabled { background: #a5b4fc; cursor: not-allowed; }
  .error-box { background: var(--danger-light); border: 1px solid #fca5a5; border-radius: 8px; padding: 0.7rem 1rem; color: var(--danger); font-size: 0.85rem; margin-bottom: 1rem; display: none; }
  .back-link { margin-top: 1.5rem; text-align: center; }
  .back-link a { font-size: 0.83rem; color: var(--muted); text-decoration: none; }
  .back-link a:hover { color: var(--accent); }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 6px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Success screen with generated Teacher ID */
  .success-box { display: none; text-align: center; }
  .success-box .check { font-size: 2.5rem; margin-bottom: 0.75rem; }
  .success-box h2 { color: var(--success); }
  .id-display { background: var(--success-light); border: 1.5px dashed var(--success); border-radius: 10px; padding: 1.25rem; margin: 1.25rem 0; }
  .id-display .lbl { font-size: 0.75rem; color: #065f46; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.35rem; }
  .id-display .val { font-size: 1.5rem; font-weight: 700; color: #065f46; font-family: monospace; letter-spacing: 0.5px; }
  .warn-note { font-size: 0.8rem; color: var(--danger); margin-bottom: 1.25rem; }
</style>
</head>
<body>
  <div class="logo">Exam<span>Flow</span></div>
  <p class="tagline">Register as a Teacher</p>

  <div class="card" id="formCard">
    <h2>Create Teacher Account</h2>
    <p class="sub">You'll get a unique Teacher ID to log in with</p>
    <div class="error-box" id="errorBox"></div>
    <div class="form-group">
      <label>Full Name *</label>
      <input type="text" id="teacherName" placeholder="e.g., Banupriya B K">
    </div>
    <div class="form-group">
      <label>Email *</label>
      <input type="email" id="teacherEmail" placeholder="you@example.com" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Password *</label>
      <input type="password" id="teacherPassword" placeholder="At least 6 characters" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label>Confirm Password *</label>
      <input type="password" id="teacherPasswordConfirm" placeholder="Re-enter password" autocomplete="new-password">
    </div>
    <button class="btn-primary" id="registerBtn" onclick="registerTeacher()">Register →</button>
    <div class="back-link"><a href="teacher-login.html">Already have a Teacher ID? Log in</a></div>
  </div>

  <div class="card success-box" id="successCard">
    <div class="check">✅</div>
    <h2>Account Created!</h2>
    <div class="id-display">
      <div class="lbl">Your Teacher ID</div>
      <div class="val" id="generatedId">—</div>
    </div>
    <p class="warn-note">⚠️ Save this ID — you'll need it (with your password) to log in every time.</p>
    <button class="btn-primary" onclick="window.location.href='teacher-dashboard.html'">Continue to Dashboard →</button>
  </div>

  <div class="back-link"><a href="index.html">← Back to home</a></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

 const firebaseConfig = {
  apiKey: "AIzaSyBemfMktY_qO3dThH7NxjIr3EhhJnlxdrA",
  authDomain: "online-exam-and-auto-grading.firebaseapp.com",
  projectId: "online-exam-and-auto-grading",
  storageBucket: "online-exam-and-auto-grading.firebasestorage.app",
  messagingSenderId: "430727378681",
  appId: "1:430727378681:web:496eda782bd99e6b7f9428"
};
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  async function generateUniqueTeacherId(name) {
    const base = (name.toLowerCase().replace(/[^a-z]/g, '') || 'teacher').slice(0, 12);
    for (let attempt = 0; attempt < 8; attempt++) {
      const candidate = base + Math.floor(1000 + Math.random() * 9000);
      const q = query(collection(db, 'teachers'), where('teacherId', '==', candidate));
      const snap = await getDocs(q);
      if (snap.empty) return candidate;
    }
    // Fallback: timestamp-based, virtually guaranteed unique
    return base + Date.now().toString().slice(-6);
  }

  window.registerTeacher = async function() {
    const name = document.getElementById('teacherName').value.trim();
    const email = document.getElementById('teacherEmail').value.trim();
    const password = document.getElementById('teacherPassword').value;
    const confirm = document.getElementById('teacherPasswordConfirm').value;
    const errorBox = document.getElementById('errorBox');
    const btn = document.getElementById('registerBtn');

    if (!name || !email || !password || !confirm) {
      errorBox.textContent = 'Please fill in all fields.';
      errorBox.style.display = 'block'; return;
    }
    if (password.length < 6) {
      errorBox.textContent = 'Password must be at least 6 characters.';
      errorBox.style.display = 'block'; return;
    }
    if (password !== confirm) {
      errorBox.textContent = 'Passwords do not match.';
      errorBox.style.display = 'block'; return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Creating account...';
    errorBox.style.display = 'none';

    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      const teacherId = await generateUniqueTeacherId(name);

      await setDoc(doc(db, 'teachers', cred.user.uid), {
        teacherId,
        name,
        email,
        createdAt: new Date().toISOString()
      });

      sessionStorage.setItem('examflow_teacher_session', JSON.stringify({
        uid: cred.user.uid, teacherId, name
      }));

      document.getElementById('formCard').style.display = 'none';
      document.getElementById('generatedId').textContent = teacherId;
      document.getElementById('successCard').style.display = 'block';
    } catch (err) {
      let msg = err.message;
      if (err.code === 'auth/email-already-in-use') msg = 'An account with this email already exists. Try logging in instead.';
      if (err.code === 'auth/invalid-email') msg = 'Please enter a valid email address.';
      errorBox.textContent = msg;
      errorBox.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = 'Register →';
    }
  };
</script>
</body>
</html>
