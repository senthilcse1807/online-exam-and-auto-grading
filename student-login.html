<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login — ExamFlow</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0; --surface: #ffffff; --primary: #1a1a2e;
    --accent: #4f46e5; --accent-light: #ede9fe;
    --text: #1a1a2e; --muted: #6b7280; --border: #e5e7eb;
    --danger: #dc2626; --danger-light: #fee2e2; --radius: 12px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 2rem; color: var(--primary); margin-bottom: 0.25rem; }
  .logo span { color: var(--accent); }
  .tagline { font-size: 0.9rem; color: var(--muted); margin-bottom: 2.5rem; text-align: center; }
  .card { background: var(--surface); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 420px; border: 1px solid var(--border); box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
  .card h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.4rem; }
  .card .sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 2rem; }
  .form-group { margin-bottom: 1.1rem; }
  .form-group label { display: block; font-size: 0.82rem; font-weight: 500; margin-bottom: 0.4rem; }
  .form-group input { width: 100%; padding: 0.7rem 0.9rem; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; color: var(--text); outline: none; transition: border-color 0.15s; }
  .form-group input:focus { border-color: var(--accent); }
  .form-group .hint { font-size: 0.75rem; color: var(--muted); margin-top: 0.3rem; }
  .btn-primary { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); padding: 0.8rem; font-size: 0.95rem; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.2s; margin-top: 0.5rem; }
  .btn-primary:hover { background: #4338ca; }
  .btn-primary:disabled { background: #a5b4fc; cursor: not-allowed; }
  .error-box { background: var(--danger-light); border: 1px solid #fca5a5; border-radius: 8px; padding: 0.7rem 1rem; color: var(--danger); font-size: 0.85rem; margin-bottom: 1rem; display: none; }
  .back-link { margin-top: 1.5rem; text-align: center; }
  .back-link a { font-size: 0.83rem; color: var(--muted); text-decoration: none; }
  .back-link a:hover { color: var(--accent); }
  .exam-preview { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px; padding: 1rem; margin-bottom: 1rem; display: none; }
  .exam-preview h3 { font-size: 0.95rem; font-weight: 600; color: #065f46; }
  .exam-preview .meta { font-size: 0.8rem; color: #047857; margin-top: 0.25rem; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 6px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="logo">Exam<span>Flow</span></div>
  <p class="tagline">Enter your exam credentials to begin</p>
  <div class="card">
    <h2>Join Exam</h2>
    <p class="sub">Your teacher will provide the Exam ID and Password</p>
    <div class="error-box" id="errorBox"></div>
    <div class="exam-preview" id="examPreview">
      <h3 id="previewTitle">—</h3>
      <div class="meta" id="previewMeta">—</div>
    </div>
    <div class="form-group">
      <label>Your Name *</label>
      <input type="text" id="studentName" placeholder="Enter your full name">
    </div>
    <div class="form-group">
      <label>Exam ID *</label>
      <input type="text" id="examId" placeholder="e.g., EXAMAB1234" oninput="liveCheck()" style="font-family:monospace;text-transform:uppercase" autocomplete="off">
      <div class="hint">Provided by your teacher</div>
    </div>
    <div class="form-group">
      <label>Exam Password *</label>
      <input type="password" id="examPassword" placeholder="Enter exam password" autocomplete="off">
    </div>
    <button class="btn-primary" id="joinBtn" onclick="joinExam()">Enter Exam →</button>
  </div>
  <div class="back-link"><a href="index.html">← Back to home</a></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAy7mFTRAmQOgPw_p6g9LJr2fd7znBnw78",
    authDomain: "examflow-a7d08.firebaseapp.com",
    projectId: "examflow-a7d08",
    storageBucket: "examflow-a7d08.firebasestorage.app",
    messagingSenderId: "778356122895",
    appId: "1:778356122895:web:8597ae3e059dda9b3d4a7a"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let liveCheckTimeout;

  window.liveCheck = function() {
    clearTimeout(liveCheckTimeout);
    liveCheckTimeout = setTimeout(async () => {
      const id = document.getElementById('examId').value.trim().toUpperCase();
      if (id.length < 6) { document.getElementById('examPreview').style.display = 'none'; return; }
      try {
        const q = query(collection(db, 'exams'), where('id', '==', id));
        const snap = await getDocs(q);
        if (!snap.empty) {
          const exam = snap.docs[0].data();
          document.getElementById('previewTitle').textContent = exam.title;
          const conductor = exam.teacherName ? `Conducted by ${exam.teacherName}  •  ` : '';
          document.getElementById('previewMeta').textContent = `${conductor}${exam.questions.length} questions  •  ${exam.duration} minutes`;
          document.getElementById('examPreview').style.display = 'block';
        } else {
          document.getElementById('examPreview').style.display = 'none';
        }
      } catch(e) {}
    }, 500);
  };

  window.joinExam = async function() {
    const name = document.getElementById('studentName').value.trim();
    const id = document.getElementById('examId').value.trim().toUpperCase();
    const pw = document.getElementById('examPassword').value.trim();
    const errorBox = document.getElementById('errorBox');
    const btn = document.getElementById('joinBtn');

    if (!name || !id || !pw) {
      errorBox.textContent = 'Please fill in all fields.';
      errorBox.style.display = 'block'; return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Checking...';
    errorBox.style.display = 'none';

    try {
      const q = query(collection(db, 'exams'), where('id', '==', id), where('password', '==', pw));
      const snap = await getDocs(q);
      if (snap.empty) {
        errorBox.textContent = 'Incorrect Exam ID or Password. Please check with your teacher.';
        errorBox.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = 'Enter Exam →';
        return;
      }
      const exam = snap.docs[0].data();
      sessionStorage.setItem('examflow_session', JSON.stringify({ examId: id, studentName: name }));
      sessionStorage.setItem('examflow_exam', JSON.stringify(exam));
      window.location.href = 'exam-page.html';
    } catch (err) {
      errorBox.textContent = 'Connection error: ' + err.message;
      errorBox.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = 'Enter Exam →';
    }
  };

  document.addEventListener('keydown', e => { if (e.key === 'Enter') window.joinExam(); });
</script>
</body>
</html>
