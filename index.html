<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExamFlow — Online Exam System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0; --surface: #ffffff; --primary: #1a1a2e;
    --accent: #4f46e5; --accent-light: #ede9fe;
    --text: #1a1a2e; --muted: #6b7280; --border: #e5e7eb; --radius: 12px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 2rem; color: var(--primary); margin-bottom: 0.25rem; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .tagline { font-size: 0.9rem; color: var(--muted); margin-bottom: 3rem; text-align: center; }
  .card { background: var(--surface); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 440px; border: 1px solid var(--border); box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
  .card h2 { font-size: 1.25rem; font-weight: 600; color: var(--text); margin-bottom: 0.5rem; }
  .card p { font-size: 0.9rem; color: var(--muted); margin-bottom: 2rem; }
  .role-btn { display: flex; align-items: center; gap: 1rem; width: 100%; padding: 1.1rem 1.25rem; border: 1.5px solid var(--border); border-radius: var(--radius); background: var(--surface); cursor: pointer; margin-bottom: 0.75rem; transition: all 0.2s ease; text-align: left; text-decoration: none; color: var(--text); }
  .role-btn:hover { border-color: var(--accent); background: var(--accent-light); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,70,229,0.12); }
  .role-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
  .role-icon.teacher { background: #fef3c7; }
  .role-icon.student { background: #dbeafe; }
  .role-info strong { display: block; font-size: 0.95rem; font-weight: 600; }
  .role-info span { font-size: 0.8rem; color: var(--muted); }
  .arrow { margin-left: auto; color: var(--muted); font-size: 1.2rem; }
  .footer { margin-top: 2rem; font-size: 0.78rem; color: var(--muted); text-align: center; }
  .online-dot { display: inline-block; width: 7px; height: 7px; background: #10b981; border-radius: 50%; margin-right: 5px; }
</style>
</head>
<body>
  <div class="logo">Exam<span>Flow</span></div>
  <p class="tagline"><span class="online-dot"></span>Online Exam & Auto Grading System</p>

  <div class="card">
    <h2>Welcome</h2>
    <p>Choose your role to continue</p>

    <a href="teacher-login.html" class="role-btn">
      <div class="role-icon teacher">🎓</div>
      <div class="role-info">
        <strong>Teacher / Professor</strong>
        <span>Log in to create & manage your exams</span>
      </div>
      <span class="arrow">›</span>
    </a>

    <a href="student-login.html" class="role-btn">
      <div class="role-icon student">📝</div>
      <div class="role-info">
        <strong>Student</strong>
        <span>Join exam using ID & password</span>
      </div>
      <span class="arrow">›</span>
    </a>
  </div>

  <p class="footer">ExamFlow &copy; 2025 — College Mini Project</p>
</body>
</html>
